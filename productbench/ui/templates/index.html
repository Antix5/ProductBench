<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductBench Leaderboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>ProductBench Leaderboard</h1>

        <div id="chart-container">
            <canvas id="performance-chart"></canvas>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Model</th>
                        <th>Label Augmentation Score</th>
                        <th>Product Reranking Distance</th>
                        <th>Token Count</th>
                        <th>Estimated Cost ($)</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    {% for row in leaderboard %}
                    <tr>
                        <td>{{ row.model }}</td>
                        <td>{{ row.label_augmentation_score }}</td>
                        <td>{{ row.product_reranking_distance }}</td>
                        <td>{{ row.token_count }}</td>
                        <td>{{ row.estimated_cost }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const leaderboardData = {{ leaderboard | tojson }};

        const chartData = leaderboardData.map(row => ({
            x: parseFloat(row.estimated_cost),
            y: parseFloat(row.label_augmentation_score),
            label: row.model
        }));

        // Calculate Pareto Frontier
        chartData.sort((a, b) => a.x - b.x);
        const paretoFrontier = [];
        let maxPerformance = -1;
        for (const point of chartData) {
            if (point.y > maxPerformance) {
                maxPerformance = point.y;
                paretoFrontier.push(point);
            }
        }

        const ctx = document.getElementById('performance-chart').getContext('2d');
        new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Models',
                    data: chartData,
                    backgroundColor: 'rgba(52, 152, 219, 0.6)',
                    borderColor: 'rgba(52, 152, 219, 1)',
                    pointRadius: 8,
                    pointHoverRadius: 10,
                    pointBackgroundColor: 'rgba(52, 152, 219, 1)'
                }, {
                    label: 'Pareto Frontier',
                    data: paretoFrontier,
                    borderColor: 'rgba(46, 204, 113, 1)',
                    backgroundColor: 'rgba(46, 204, 113, 0.2)',
                    type: 'line',
                    showLine: true,
                    fill: false,
                    pointRadius: 0,
                    borderWidth: 2,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        title: {
                            display: true,
                            text: 'Estimated Cost ($)',
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        },
                        grid: {
                            color: '#eee'
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Performance (Label Augmentation Score)',
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        },
                        grid: {
                            color: '#eee'
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: {
                                size: 12
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(44, 62, 80, 0.9)',
                        padding: 10,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.data[context.dataIndex].label || '';
                                if (label) {
                                    label += ': ';
                                }
                                label += `(Cost: ${context.parsed.x}, Score: ${context.parsed.y})`;
                                return label;
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
